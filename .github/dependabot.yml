version: 2
updates:
  # Python dependencies (requirements.txt / requirements-dev.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Docker images: our own Dockerfile base image, AND the pinned
  # familylink-auth tag referenced in docker-compose.yml. Dependabot's
  # docker ecosystem scans both Dockerfiles and compose files for image
  # references, so bumps to the upstream auth container are proposed here
  # too -- review its release notes before merging those PRs, since it
  # handles the sensitive login/cookie flow.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
