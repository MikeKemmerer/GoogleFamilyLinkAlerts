<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Family Link Alerts{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Applied before paint (no flash of the wrong theme). "auto" means no
    // data-theme attribute at all -- style.css's prefers-color-scheme media
    // query then takes over. This purely affects this app's own web UI;
    // it has nothing to do with the actual Google Family Link account.
    (function () {
      var theme = "{{ theme|default('auto') }}";
      if (theme === "light" || theme === "dark") {
        document.documentElement.setAttribute("data-theme", theme);
      }
    })();
  </script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% if setup_completed %}
  <nav class="top-nav">
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
      <svg class="icon icon-lg"><use href="/static/icons.svg#icon-house"></use></svg>Status
    </a>
    <a href="/history" class="{% if request.url.path == '/history' %}active{% endif %}">
      <svg class="icon icon-lg"><use href="/static/icons.svg#icon-list"></use></svg>History
    </a>
    <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">
      <svg class="icon icon-lg"><use href="/static/icons.svg#icon-settings"></use></svg>Settings
    </a>
    <button type="button" class="theme-toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')" title="Toggle light/dark (this browser only until saved in Settings)">
      <svg class="icon icon-lg"><use href="/static/icons.svg#icon-sun"></use></svg>
    </button>
  </nav>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
